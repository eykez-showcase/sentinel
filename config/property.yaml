property:
  name: "My Home"
  address: "123 Example St"

cameras:
  - id: front_door
    name: "Front Door Cam"
    stream_url: "rtsp://192.168.1.100/stream1"
    position:
      x_meters: 0.0
      y_meters: 0.0
    fov_degrees: 120

  - id: driveway_cam
    name: "Driveway Cam"
    stream_url: "rtsp://192.168.1.101/stream1"
    position:
      x_meters: 15.0
      y_meters: 0.0
    fov_degrees: 90

zones:
  # Polygons use normalized image coordinates [0.0–1.0].
  # Points are [x, y] clockwise from top-left.

  - id: driveway
    name: "Driveway"
    camera_id: driveway_cam
    polygon:
      - [0.0, 0.2]
      - [1.0, 0.2]
      - [1.0, 0.9]
      - [0.0, 0.9]
    alert_classes: [person, car, truck, motorcycle]

  - id: front_porch
    name: "Front Porch"
    camera_id: front_door
    polygon:
      - [0.30, 0.45]
      - [0.70, 0.45]
      - [0.70, 1.00]
      - [0.30, 1.00]
    alert_classes: [person]

  - id: front_walkway
    name: "Front Walkway"
    camera_id: front_door
    polygon:
      - [0.20, 0.20]
      - [0.80, 0.20]
      - [0.80, 0.45]
      - [0.20, 0.45]
    alert_classes: [person]

  - id: street_view
    name: "Street / Sidewalk"
    camera_id: front_door
    polygon:
      - [0.0, 0.0]
      - [1.0, 0.0]
      - [1.0, 0.20]
      - [0.0, 0.20]
    alert_classes: [person, car, truck]
